<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Digital Interativo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0d0d11;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .iframe-container,
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div id="app" class="iframe-container"></div>

  <script>
    const clientes = {
      "matheus-e-beatriz": "a1aceea4c3",
      "mariana-e-pedro": "abc123xyz"
    };

    function carregarConvite() {
      const params = new URLSearchParams(window.location.search);
      let clienteKey = params.get("c");

      if (!clienteKey && window.location.hash) {
        clienteKey = window.location.hash.replace("#", "");
      }

      const appContainer = document.getElementById("app");

      if (clienteKey && clientes[clienteKey]) {
        const heyzineId = clientes[clienteKey];
        appContainer.innerHTML = `
          <iframe
            src="https://heyzine.com/flip-book/${heyzineId}.html"
            allow="fullscreen"
            scrolling="no">
          </iframe>
        `;
      }
    }

    window.addEventListener("DOMContentLoaded", carregarConvite);
  </script>

</body>
</html>
