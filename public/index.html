<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Digital Interativo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0d0d11;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Tela de Boas-Vindas (Envelope Virtual) */
    .welcome-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #1a1a24 0%, #0d0d11 100%);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .welcome-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px 25px;
      border-radius: 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      max-width: 340px;
      width: 100%;
    }

    .welcome-icon {
      font-size: 42px;
      margin-bottom: 15px;
      display: inline-block;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .welcome-title {
      color: #ffffff;
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .welcome-subtitle {
      color: #a0a0ab;
      font-size: 13px;
      margin-bottom: 25px;
      line-height: 1.4;
    }

    .btn-open {
      background: #ffffff;
      color: #0d0d11;
      border: none;
      padding: 14px 28px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255, 255, 255, 0.15);
      transition: transform 0.2s ease, background-color 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-open:active {
      transform: scale(0.96);
    }

    /* Container do Convite */
    .main-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .iframe-container, iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Botão de Som Flutuante */
    .audio-btn {
      position: absolute;
      top: 12px;
      right: 15px;
      z-index: 9999;
      background: rgba(20, 20, 25, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #ffffff;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      transition: all 0.2s ease;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      color: #ffffff;
      max-width: 380px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .status-card h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .status-card p {
      font-size: 14px;
      color: #a0a0ab;
      line-height: 1.4;
    }

    .hidden {
      display: none !important;
    }

    .fade-out {
      opacity: 0;
      visibility: hidden;
    }
  </style>
</head>
<body>

  <!-- Áudio em Segundo Plano -->
  <audio id="bg-music" loop preload="auto">
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <!-- Tela de Abertura (Garante a música no Celular) -->
  <div id="welcome-screen" class="welcome-overlay hidden">
    <div class="welcome-card">
      <div class="welcome-icon">💌</div>
      <h2 class="welcome-title">Você recebeu um convite</h2>
      <p class="welcome-subtitle">Clique abaixo para abrir com música</p>
      <button class="btn-open" onclick="abrirConvite()">
        <span>Abrir Convite</span>
        <span>🎵</span>
      </button>
    </div>
  </div>

  <!-- Tela de Erro -->
  <div id="not-found" class="status-card hidden">
    <h1>Convite não encontrado 💌</h1>
    <p>O link acessado não possui um convite ativo. Verifique o endereço digitado.</p>
  </div>

  <!-- Conteúdo do Convite -->
  <div id="main-content" class="main-wrapper hidden">
    <button id="audio-control" class="audio-btn" onclick="toggleAudio()">
      <span id="audio-icon">🔊</span> <span id="audio-text">Música</span>
    </button>

    <div id="app" class="iframe-container"></div>
  </div>

  <script>
    const clientes = {
      "matheus-e-beatriz": "a1aceea4c3",
      "mariana-e-pedro": "abc123xyz"
    };

    const audio = document.getElementById('bg-music');
    const audioIcon = document.getElementById('audio-icon');
    const welcomeScreen = document.getElementById('welcome-screen');
    const mainContent = document.getElementById('main-content');
    const notFoundCard = document.getElementById('not-found');

    // Volume Suave (20%)
    audio.volume = 0.2;

    function carregarConvite() {
      const params = new URLSearchParams(window.location.search);
      let clienteKey = params.get('c');

      if (!clienteKey && window.location.hash) {
        clienteKey = window.location.hash.replace('#', '');
      }

      const appContainer = document.getElementById('app');

      if (clienteKey && clientes[clienteKey]) {
        const heyzineId = clientes[clienteKey];
        const iframeSrc = `https://heyzine.com/flip-book/${heyzineId}.html`;

        appContainer.innerHTML = `
          <iframe 
            src="${iframeSrc}" 
            allow="fullscreen *; clipboard-write *" 
            allowfullscreen="allowfullscreen" 
            scrolling="no">
          </iframe>
        `;
        
        // Exibe a tela de abertura
        welcomeScreen.classList.remove('hidden');
        notFoundCard.classList.add('hidden');
      } else {
        welcomeScreen.classList.add('hidden');
        mainContent.classList.add('hidden');
        notFoundCard.classList.remove('hidden');
      }
    }

    function abrirConvite() {
      // 1. Toca o áudio liberado pelo clique
      audio.play().then(() => {
        audioIcon.innerText = "🔊";
      }).catch(err => {
        console.log("Erro ao reproduzir áudio:", err);
      });

      // 2. Transição suave da tela de abertura para o convite
      welcomeScreen.classList.add('fade-out');
      mainContent.classList.remove('hidden');

      setTimeout(() => {
        welcomeScreen.classList.add('hidden');
      }, 600);
    }

    function toggleAudio() {
      if (audio.paused) {
        audio.play();
        audioIcon.innerText = "🔊";
      } else {
        audio.pause();
        audioIcon.innerText = "🔇";
      }
    }

    window.addEventListener('DOMContentLoaded', carregarConvite);
    window.addEventListener('hashchange', carregarConvite);
  </script>
</body>
</html>
