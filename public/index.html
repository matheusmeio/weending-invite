<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Digital Interativo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0d0d11;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Container Principal */
    .main-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .iframe-container, iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Botão de Som Ajustado (Fica ao lado/topo do convite) */
    .audio-btn {
      position: absolute;
      top: 12px;
      right: 15px;
      z-index: 9999;
      background: rgba(20, 20, 25, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #ffffff;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      transition: all 0.2s ease;
    }

    .audio-btn:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .status-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      color: #ffffff;
      max-width: 380px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .status-card h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .status-card p {
      font-size: 14px;
      color: #a0a0ab;
      line-height: 1.4;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- Tag de Áudio com volume inicial controlado -->
  <audio id="bg-music" loop preload="auto">
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <div id="not-found" class="status-card hidden">
    <h1>Convite não encontrado 💌</h1>
    <p>O link acessado não possui um convite ativo. Verifique o endereço digitado.</p>
  </div>

  <div id="main-content" class="main-wrapper hidden">
    <!-- Botão do Som alinhado junto ao iFrame -->
    <button id="audio-control" class="audio-btn" onclick="toggleAudio()">
      <span id="audio-icon">🎵</span> <span id="audio-text">Música</span>
    </button>

    <div id="app" class="iframe-container"></div>
  </div>

  <script>
    const clientes = {
      "matheus-e-beatriz": "a1aceea4c3",
      "mariana-e-pedro": "abc123xyz"
    };

    const audio = document.getElementById('bg-music');
    const audioBtn = document.getElementById('audio-control');
    const audioIcon = document.getElementById('audio-icon');
    let audioIniciado = false;

    // Define o volume inicial baixo (0.2 = 20% do volume máximo)
    audio.volume = 0.2; 

    function tentarTocarAudio() {
      if (!audioIniciado) {
        audio.play().then(() => {
          audioIniciado = true;
          audioIcon.innerText = "🔊";
        }).catch(err => {
          // Bloqueado pelo navegador até o primeiro clique
          console.log("Autoplay retido pelo navegador:", err);
        });
      }
    }

    function carregarConvite() {
      const params = new URLSearchParams(window.location.search);
      let clienteKey = params.get('c');

      if (!clienteKey && window.location.hash) {
        clienteKey = window.location.hash.replace('#', '');
      }

      const mainContent = document.getElementById('main-content');
      const appContainer = document.getElementById('app');
      const notFoundCard = document.getElementById('not-found');

      if (clienteKey && clientes[clienteKey]) {
        const heyzineId = clientes[clienteKey];
        const iframeSrc = `https://heyzine.com/flip-book/${heyzineId}.html`;

        appContainer.innerHTML = `
          <iframe 
            src="${iframeSrc}" 
            allow="autoplay *; fullscreen *; clipboard-write *" 
            allowfullscreen="allowfullscreen" 
            scrolling="no">
          </iframe>
        `;
        
        mainContent.classList.remove('hidden');
        notFoundCard.classList.add('hidden');

        // Tenta iniciar a música imediatamente ao carregar
        tentarTocarAudio();

        // Caso o navegador exija toque/clique prévio, inicia no primeiro toque em qualquer lugar
        document.addEventListener('click', tentarTocarAudio, { once: true });
        document.addEventListener('touchstart', tentarTocarAudio, { once: true });

      } else {
        mainContent.classList.add('hidden');
        notFoundCard.classList.remove('hidden');
      }
    }

    function toggleAudio() {
      if (audio.paused) {
        audio.play();
        audioIcon.innerText = "🔊";
      } else {
        audio.pause();
        audioIcon.innerText = "🔇";
      }
    }

    window.addEventListener('DOMContentLoaded', carregarConvite);
    window.addEventListener('hashchange', carregarConvite);
  </script>
</body>
</html>
