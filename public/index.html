<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Digital Interativo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0d0d11;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .iframe-container, iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      color: #ffffff;
      max-width: 380px;
      margin: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .status-card h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .status-card p {
      font-size: 14px;
      color: #a0a0ab;
      line-height: 1.4;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div id="not-found" class="status-card hidden">
    <h1>Convite não encontrado 💌</h1>
    <p>O link acessado não possui um convite ativo. Verifique o endereço digitado.</p>
  </div>

  <div id="app" class="iframe-container hidden"></div>

  <script>
    // =========================================================
    // DICIONÁRIO DE CLIENTES
    // Adicione novos clientes aqui:
    // "nome-do-cliente": "ID_DO_HEYZINE"
    // =========================================================
    const clientes = {
      "matheus-e-beatriz": "a1aceea4c3",
      "mariana-e-pedro": "abc123xyz"
    };

    function carregarConvite() {
      const params = new URLSearchParams(window.location.search);
      let clienteKey = params.get('c');

      if (!clienteKey && window.location.hash) {
        clienteKey = window.location.hash.replace('#', '');
      }

      const appContainer = document.getElementById('app');
      const notFoundCard = document.getElementById('not-found');

      if (clienteKey && clientes[clienteKey]) {
        const heyzineId = clientes[clienteKey];
        const iframeSrc = `https://heyzine.com/flip-book/${heyzineId}.html`;

        appContainer.innerHTML = `
          <iframe 
            src="${iframeSrc}" 
            allow="autoplay; fullscreen; clipboard-write" 
            allowfullscreen="allowfullscreen" 
            scrolling="no">
          </iframe>
        `;
        appContainer.classList.remove('hidden');
        notFoundCard.classList.add('hidden');
      } else {
        appContainer.classList.add('hidden');
        notFoundCard.classList.remove('hidden');
      }
    }

    window.addEventListener('DOMContentLoaded', carregarConvite);
    window.addEventListener('hashchange', carregarConvite);
  </script>
</body>
</html>
